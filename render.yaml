services:
  - type: web
    name: komatsu-830e-guru
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: OPENAI_MODEL
        value: gpt-5.6-sol
      - key: PYTHON_PATH
        value: python3
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
    disk:
      name: guru-data
      mountPath: /app/data
      sizeGB: 5
